name: Build and Release WPF App

on:
  push:
    branches:
      - master
      - main        # Run on every commit
    tags:
      - 'v*'        # Run on version tags (v1.0.0 etc.)
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Optional application name to use for artifact/release'
        required: false
        # default intentionally removed; job-level env provides the single source-of-truth

permissions:
  contents: write   # Required to create releases

# APP_NAME is resolved per-run so it can be optionally overridden when using workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app_name || 'HelloWo4rldWPFApp' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish WPF App
      shell: pwsh
      run: |
        dotnet publish "$env:APP_NAME\$env:APP_NAME.csproj" `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          -o publish

    - name: Zip published output
      shell: pwsh
      run: |
        Compress-Archive -Path publish\* -DestinationPath ${{ env.APP_NAME }}-${{ github.ref_name }}.zip

    - name: Upload published artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-${{ github.ref_name }}
        path: ${{ env.APP_NAME }}-${{ github.ref_name }}.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.APP_NAME }}-${{ github.ref_name }}.zip
      env:
        # Provide a Personal Access Token (PAT) with appropriate permissions as a repository secret
        # Create a secret named `RELEASE_PAT` in the repo (Settings → Secrets → Actions) and set it to your token.
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
